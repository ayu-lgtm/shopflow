# ══════════════════════════════════════════════════════════
#  ShopFlow - Kubernetes Manifests
#  kubectl apply -f k8s/ se sab deploy ho jayega
# ══════════════════════════════════════════════════════════

---
# ── Namespace ──────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: shopflow

---
# ── Eureka Server Deployment ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: YOUR_DOCKERHUB/shopflow-eureka:latest
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: shopflow
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761

---
# ── User Service Deployment ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: YOUR_DOCKERHUB/shopflow-user:latest
          ports:
            - containerPort: 8081
          env:
            - name: EUREKA_URL
              value: "http://eureka-server:8761/eureka/"
            - name: KAFKA_URL
              value: "kafka:29092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopflow
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081

---
# ── Product Service Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: YOUR_DOCKERHUB/shopflow-product:latest
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_URL
              value: "http://eureka-server:8761/eureka/"
            - name: KAFKA_URL
              value: "kafka:29092"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopflow
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082

---
# ── API Gateway Deployment ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOUR_DOCKERHUB/shopflow-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_URL
              value: "http://eureka-server:8761/eureka/"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shopflow
spec:
  type: LoadBalancer   # Cloud pe external IP milega
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080

---
# ── Secrets (JWT key etc.) ─────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: shopflow-secrets
  namespace: shopflow
type: Opaque
stringData:
  jwt-secret: "shopflow-super-secret-key-must-be-256-bits-long!"
